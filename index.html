<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Typeface Studio</title>
  <meta name="description" content="Typeface Studio — a music video and commercial production company.">

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="favicon.svg">

  <!-- Open Graph -->
  <meta property="og:title" content="Typeface Studio">
  <meta property="og:description" content="A music video and commercial production company.">
  <meta property="og:image" content="https://typefacestudio.com/og-preview.png">
  <meta property="og:url" content="https://typefacestudio.com">
  <meta property="og:type" content="website">

  <!-- Twitter / X -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Typeface Studio">
  <meta name="twitter:description" content="A music video and commercial production company.">
  <meta name="twitter:image" content="https://typefacestudio.com/og-preview.png">

  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,700;0,800;1,400;1,700&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Bodoni+Moda:opsz,ital,wght@6..96,0,400;6..96,0,700;6..96,0,900;6..96,1,400&family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700;1,900&family=Libre+Franklin:wght@100;200;400;700;900&family=News+Cycle:wght@400;700&family=Oswald:wght@200;300;400;700&family=Courier+Prime:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
</head>
<body>

  <header class="header">
    <span class="logo" id="logo" aria-label="TYPEFACE">
      <span class="logo-l">T</span><span
      class="logo-l">Y</span><span
      class="logo-l">P</span><span
      class="logo-l">E</span><span
      class="logo-l">F</span><span
      class="logo-l">A</span><span
      class="logo-l">C</span><span
      class="logo-l">E</span>
    </span>

    <nav class="filter-nav">
      <button class="filter active" data-filter="all">All</button>
      <span class="fsep">·</span>
      <button class="filter" data-filter="music-video">Music</button>
      <span class="fsep">·</span>
      <button class="filter" data-filter="commercial">Commercial</button>
      <span class="fsep">·</span>
      <button class="filter" data-filter="photoshoot">Photo</button>
    </nav>

  </header>

  <main class="main">
    <!-- Full-width title list -->
    <ul class="title-list" id="title-list"></ul>
  </main>

  <footer class="colophon">
    <span class="col-text col-fontlist">Set in Garamond, Baskerville, Bodoni, Playfair, Franklin Gothic, News Cycle, Oswald &amp; Courier</span>
    <span class="col-orn col-fontlist">&#10022;</span>
    <span class="col-text">Typeface Studio &#10022; &copy; 2025</span>
    <span class="col-orn">&#10022;</span>
    <span class="col-text">Edition No. <span id="edition"></span></span>
    <span class="col-orn">&#10022;</span>
    <a class="contact-link col-text" href="mailto:aiden@aidenmagarian.com">Contact</a>
  </footer>

  <!-- Floating image -->
  <div class="img-float" id="img-float">
    <img id="img-float-src" src="" alt="">
  </div>

  <!-- Project overlay -->
  <div class="project-overlay" id="project-overlay">
    <div class="ov-panel">
      <header class="ov-header">
        <div class="ov-header-meta">
          <span class="ov-year"></span>
          <span class="ov-sep">—</span>
          <span class="ov-cat"></span>
        </div>
        <span class="ov-title"></span>
        <button class="ov-close" id="ov-close" aria-label="Close">&#215;</button>
      </header>
      <div class="ov-body"></div>
      <div class="ov-caption">
        <span class="ov-cap-year"></span>
        <span class="ov-cap-sep">—</span>
        <span class="ov-cap-cat"></span>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@mux/mux-player@3.11.5" type="module"></script>
  <script src="script.js"></script>
</body>
</html>
